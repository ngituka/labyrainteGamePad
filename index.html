<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>labyrainté</title>
    <link href="manette.css" rel="stylesheet">
    <script type="module" src="script/manette.js"></script>
    <script type="module" src="script/joystick.js"></script>
</head>
<body>
    <div id="orientationOverlay">
        <h2 class="orientationText">Pour jouer à labyrainté, mets ton téléphone en more paysage.</h2>
    </div>
    <div class="health-bar">
        <span class="pv-text">PV:</span>
        <div class="pv-bar-container">
            <div class="pv-bar-fill" id="pvBarFill"></div>
            <span class="pv-bar-text" id="pvBarText">100%</span>
        </div>
    </div>

    <div class="controls-area">
        
        <div class="joystick-wrapper">
            <img src="images/bg-joystick.png" alt="fond joystick" class="joystick-bg">
            <img src="images/joystick.png" alt="joystick" class="joystick-stick" id="joystick" draggable="false">
        </div>

        <div class="action-buttons">
            <div class="btn-shoot-wrapper">
                <img src="images/shoot.png" alt="bouton tirer" class="action-btn" id="shoot">
            </div>
        </div>

    </div>

</body>
</html>
